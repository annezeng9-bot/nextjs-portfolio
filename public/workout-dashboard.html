<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKOUT TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #222;
    --acid: #c8ff00;
    --hot: #ff3c5a;
    --ice: #00d4ff;
    --muted: #555;
    --text: #e8e8e8;
    --dim: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--acid);
    text-shadow: 0 0 40px rgba(200,255,0,0.3);
  }

  .logo span { color: var(--text); }

  .header-meta {
    text-align: right;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.8;
  }

  .header-meta strong {
    color: var(--text);
    display: block;
    font-size: 1rem;
  }

  main {
    padding: 2rem 2.5rem;
    display: grid;
    gap: 1.5rem;
  }

  /* TOP ROW - stat cards */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, var(--acid));
  }

  .stat-card:nth-child(1) { --accent: var(--acid); animation-delay: 0.05s; }
  .stat-card:nth-child(2) { --accent: var(--hot); animation-delay: 0.1s; }
  .stat-card:nth-child(3) { --accent: var(--ice); animation-delay: 0.15s; }
  .stat-card:nth-child(4) { --accent: #c084fc; animation-delay: 0.2s; }

  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--dim);
    margin-bottom: 0.5rem;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--accent, var(--acid));
  }

  .stat-sub {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* VOLUME CHART */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1.5rem;
    animation: fadeUp 0.5s 0.25s ease both;
  }

  .card-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--dim);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    height: 140px;
    padding-bottom: 2rem;
    position: relative;
  }

  .bar-chart::after {
    content: '';
    position: absolute;
    bottom: 2rem; left: 0; right: 0;
    height: 1px;
    background: var(--border);
  }

  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    height: 100%;
    justify-content: flex-end;
    position: relative;
  }

  .bar-fill {
    width: 100%;
    background: var(--acid);
    transition: height 1s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    min-height: 2px;
    opacity: 0.85;
  }

  .bar-fill:hover { opacity: 1; filter: brightness(1.2); }

  .bar-fill.is-highest { background: var(--acid); opacity: 1; }
  .bar-fill.is-low { background: var(--muted); }

  .bar-label {
    position: absolute;
    bottom: -1.8rem;
    font-size: 0.55rem;
    color: var(--dim);
    text-align: center;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .bar-val {
    position: absolute;
    top: -1.4rem;
    font-size: 0.6rem;
    color: var(--acid);
    white-space: nowrap;
  }

  /* TWO-COL */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  /* LIFT TABLE */
  .lift-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }

  .lift-table tr {
    border-bottom: 1px solid var(--border);
  }

  .lift-table tr:last-child { border-bottom: none; }

  .lift-table td {
    padding: 0.7rem 0;
    vertical-align: middle;
  }

  .lift-table td:last-child {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
  }

  .lift-name { color: var(--text); }
  .lift-count { color: var(--dim); font-size: 0.65rem; display: block; }

  .lift-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 0.35rem;
  }

  .lift-bar-fill {
    height: 100%;
    background: var(--hot);
    border-radius: 2px;
    transition: width 1s ease;
  }

  /* VIBE NOTES */
  .notes-grid {
    display: grid;
    gap: 0.6rem;
  }

  .note-item {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-left: 3px solid var(--vibe-color, var(--dim));
    padding: 0.6rem 0.8rem;
    font-size: 0.7rem;
    display: flex;
    gap: 0.75rem;
    align-items: baseline;
    animation: fadeUp 0.4s ease both;
  }

  .note-date { color: var(--dim); white-space: nowrap; flex-shrink: 0; font-size: 0.6rem; }
  .note-text { color: var(--text); line-height: 1.4; font-style: italic; }

  /* HEATMAP ROW */
  .heatmap-row {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .heat-cell {
    width: 28px;
    height: 28px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: var(--dim);
    position: relative;
    cursor: default;
    transition: transform 0.15s;
  }

  .heat-cell:hover { transform: scale(1.15); z-index: 10; }

  .heat-cell.has-workout {
    background: var(--acid);
    color: #000;
    font-weight: bold;
  }

  .heat-cell.is-big {
    background: var(--hot);
    color: #fff;
  }

  /* EXERCISE BREAKDOWN donut-style */
  .muscle-pills {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .muscle-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.7rem;
  }

  .muscle-name { width: 120px; color: var(--dim); flex-shrink: 0; }

  .muscle-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .muscle-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .muscle-pct { color: var(--text); font-size: 0.65rem; width: 35px; text-align: right; }

  /* TOOLTIP */
  .bar-tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid var(--acid);
    color: var(--acid);
    font-size: 0.6rem;
    padding: 0.3rem 0.5rem;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 50;
    letter-spacing: 0.05em;
  }
  .bar-group:hover .bar-tooltip { opacity: 1; }

  /* FREQ DOT CHART */
  .freq-chart {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.5rem;
    width: 100%;
    margin-top: 0.25rem;
  }
  .freq-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    position: relative;
  }
  .freq-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
    cursor: default;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .freq-dot:hover { transform: scale(1.12); }
  .freq-dot.active { background: var(--acid); box-shadow: 0 0 8px rgba(200,255,0,0.45); }
  .freq-day-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.58rem;
    padding: 0.3rem 0.55rem;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 50;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.5;
  }
  .freq-day:hover .freq-day-tooltip { opacity: 1; }
  .freq-legend {
    font-size: 0.6rem;
    color: var(--dim);
    margin-top: 0.75rem;
    display: flex;
    gap: 1.2rem;
    justify-content: center;
  }
  .freq-legend span { display: flex; align-items: center; gap: 0.4rem; }
  .dot-sample {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block;
  }

  /* QUOTE BLOCK */
  .quote-block {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1.5rem 2rem;
    text-align: center;
    animation: fadeUp 0.5s 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .quote-block::before {
    content: '"';
    position: absolute;
    top: -1rem;
    left: 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 8rem;
    color: var(--border);
    line-height: 1;
    pointer-events: none;
  }

  .quote-text {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: clamp(0.8rem, 1.8vw, 1.1rem);
    color: var(--text);
    position: relative;
    z-index: 1;
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .quote-attr {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 768px) {
    main { padding: 1rem; }
    header { padding: 1.25rem 1rem; flex-direction: column; align-items: flex-start; }
    .stat-row { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>

const BW = 145; // bodyweight lbs

function calcVolume(session) {
  let vol = 0;
  session.exercises.forEach(ex => {
    ex.sets.forEach(s => {
      if (s.type === 'warmup') return;
      const reps = s.r || s.reps || 0;
      if (s.w) {
        vol += s.w * reps;
      } else if (reps > 0) {
        // bodyweight exercise
        vol += BW * reps;
      }
    });
  });
  return Math.round(vol);
}

function totalReps(session, exName) {
  const ex = session.exercises.find(e => e.name === exName);
  if (!ex) return 0;
  return ex.sets.filter(s => s.type !== 'warmup').reduce((a, s) => a + (s.r || s.reps || 0), 0);
}

  ...s,
  volume: calcVolume(s),
  pullupReps: totalReps(s, 'Pull Up'),
  dateObj: new Date(s.date),
  shortDate: new Date(s.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
})).sort((a, b) => a.dateObj - b.dateObj);

// Weekly minutes — group sessions by ISO week
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return `${d.getFullYear()}-W${String(1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7)).padStart(2,'0')}`;
}

function weekLabel(isoWeek) {
  const [year, wStr] = isoWeek.split('-W');
  const w = parseInt(wStr);
  const jan4 = new Date(parseInt(year), 0, 4);
  const weekStart = new Date(jan4.getTime() + (w - 1) * 7 * 86400000 - ((jan4.getDay() + 6) % 7) * 86400000);
  return weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Profanity censor
function censorText(text) {
  const map = {
    'fucked up': 'f***ed up',
    'fucked': 'f***ed',
    'fucking': 'f***ing',
    'fucks': 'f***s',
    'fuck': 'f***',
    'shit': 's***',
    'ass': 'a**',
    'wtf': 'w**',
    'damn': 'd***',
    'crap': 'c***',
  };
  let out = text;
  for (const [word, repl] of Object.entries(map)) {
    out = out.replace(new RegExp(`\\b${word}\\b`, 'gi'), repl);
  }
  return out;
}

// Pull-up reps SVG line chart
(function() {
  const svg = document.getElementById('pullupChart');
  const W = svg.parentElement.clientWidth - 32;
  const H = 160;
  const PAD = { top: 20, right: 16, bottom: 28, left: 36 };
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);

  // One point per session — total working pull-up reps
  const points = sessions.map(s => ({ date: s.shortDate, reps: s.pullupReps }));
  const n = points.length;
  const xScale = i => PAD.left + (i / (n - 1)) * (W - PAD.left - PAD.right);
  const allReps = points.map(p => p.reps);
  const minR = Math.max(0, Math.min(...allReps) - 2);
  const maxR = Math.max(...allReps) + 2;
  const yScale = r => PAD.top + (1 - (r - minR) / (maxR - minR)) * (H - PAD.top - PAD.bottom);

  let html = '';

  // Grid + Y labels
  const yTicks = [minR, Math.round((minR + maxR) / 2), maxR].map(v => Math.round(v));
  [...new Set(yTicks)].forEach(val => {
    const y = yScale(val);
    html += `<line x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
    html += `<text x="${PAD.left - 6}" y="${y + 4}" fill="#444" font-size="9" text-anchor="end" font-family="Space Mono,monospace">${val}</text>`;
  });

  // X labels
  points.forEach((p, i) => {
    html += `<text x="${xScale(i)}" y="${H - 4}" fill="#444" font-size="8" text-anchor="middle" font-family="Space Mono,monospace">${p.date}</text>`;
  });

  // Area fill under line
  const linePts = points.map((p, i) => `${xScale(i)},${yScale(p.reps)}`).join(' ');
  const baseline = yScale(minR);
  const areaD = `M ${xScale(0)},${baseline} L ${points.map((p,i) => `${xScale(i)},${yScale(p.reps)}`).join(' L ')} L ${xScale(n-1)},${baseline} Z`;
  html += `<path d="${areaD}" fill="#00d4ff" opacity="0.06"/>`;

  // Line
  const lineD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i)} ${yScale(p.reps)}`).join(' ');
  html += `<path d="${lineD}" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Dots + tooltips
  points.forEach((p, i) => {
    const x = xScale(i), y = yScale(p.reps);
    const isHigh = p.reps === Math.max(...allReps);
    const isLow = p.reps === Math.min(...allReps);
    const dotColor = isHigh ? '#c8ff00' : isLow ? '#ff3c5a' : '#00d4ff';
    const tipX = Math.min(Math.max(x, PAD.left + 30), W - PAD.right - 30);
    html += `
      <g class="pu-dot-group" style="cursor:default">
        <circle cx="${x}" cy="${y}" r="${isHigh || isLow ? 4.5 : 3.5}" fill="${dotColor}" stroke="#111" stroke-width="1.5"/>
        <circle cx="${x}" cy="${y}" r="12" fill="transparent"/>
        <g class="pu-dot-tip" style="pointer-events:none;opacity:0;transition:opacity 0.15s">
          <rect x="${tipX - 24}" y="${y - 28}" width="48" height="18" rx="2" fill="#1a1a1a" stroke="#333"/>
          <text x="${tipX}" y="${y - 15}" fill="${dotColor}" font-size="9" text-anchor="middle" font-family="Space Mono,monospace">${p.reps} reps</text>
        </g>
      </g>`;
  });

  svg.innerHTML = html;

  svg.querySelectorAll('.pu-dot-group').forEach(g => {
    const tip = g.querySelector('.pu-dot-tip');
    g.addEventListener('mouseenter', () => tip.style.opacity = '1');
    g.addEventListener('mouseleave', () => tip.style.opacity = '0');
  });
})();
const modalOverlay = document.createElement('div');
modalOverlay.id = 'modal-overlay';
modalOverlay.style.cssText = `
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.78);
  z-index:2000; align-items:center; justify-content:center; padding:1.5rem;
`;
modalOverlay.innerHTML = `
  <div id="modal-box" style="
    background:#111; border:1px solid #2a2a2a; max-width:500px; width:100%;
    max-height:78vh; overflow-y:auto; padding:1.5rem 1.75rem; position:relative;
    font-family:'Space Mono',monospace;
  ">
    <button id="modal-close" style="
      position:absolute; top:1rem; right:1rem; background:none; border:none;
      color:#555; font-size:1rem; cursor:pointer; font-family:inherit; line-height:1;
      transition: color 0.15s;
    " onmouseover="this.style.color='#e8e8e8'" onmouseout="this.style.color='#555'">✕</button>
    <div id="modal-content"></div>
  </div>
`;
document.body.appendChild(modalOverlay);

function openModal(idx) {
  const s = sessions[idx];
  const workingSets = s.exercises.map(ex => {
    const sets = ex.sets.filter(st => st.type !== 'warmup');
    if (!sets.length) return null;
    const rows = sets.map((st, i) => {
      const reps = st.r || st.reps || 0;
      const weight = st.w ? `${st.w} lbs` : `BW`;
      const vol = st.w ? st.w * reps : 145 * reps;
      const isFail = st.type === 'failure';
      return `<tr>
        <td style="color:#444;padding:0.3rem 0.75rem 0.3rem 0;font-size:0.62rem;white-space:nowrap">Set ${i+1}${isFail ? ' <span style="color:#ff3c5a">FAIL</span>' : ''}</td>
        <td style="color:#e8e8e8;padding:0.3rem 0.75rem;font-size:0.7rem">${weight} × ${reps}</td>
        <td style="color:#444;padding:0.3rem 0 0.3rem 0.75rem;font-size:0.62rem;text-align:right;white-space:nowrap">${vol.toLocaleString()} lbs</td>
      </tr>`;
    }).join('');
    const exVol = sets.reduce((a, st) => {
      const r = st.r || st.reps || 0;
      return a + (st.w ? st.w * r : 145 * r);
    }, 0);
    return `
      <div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.35rem">
          <div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:#666">${ex.name}</div>
          <div style="font-size:0.6rem;color:#444">${exVol.toLocaleString()} lbs</div>
        </div>
        <table style="width:100%;border-collapse:collapse">${rows}</table>
        <div style="height:1px;background:#1a1a1a;margin-top:0.6rem"></div>
      </div>`;
  }).filter(Boolean).join('');

  document.getElementById('modal-content').innerHTML = `
    <div style="margin-bottom:1.25rem;padding-bottom:0.9rem;border-bottom:1px solid #1e1e1e">
      <div style="font-size:0.58rem;text-transform:uppercase;letter-spacing:0.15em;color:#444;margin-bottom:0.3rem">${s.shortDate} · ${s.duration} min</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#c8ff00;letter-spacing:0.01em;line-height:1.1">${s.title}</div>
      <div style="font-size:0.65rem;color:#555;margin-top:0.3rem">${s.volume.toLocaleString()} lbs total volume</div>
    </div>
    ${workingSets}
  `;
  modalOverlay.style.display = 'flex';
}

document.querySelectorAll('.bar-group').forEach(el => {
  el.addEventListener('click', () => openModal(+el.dataset.idx));
});
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.style.display = 'none'; });
document.getElementById('modal-close').addEventListener('click', () => modalOverlay.style.display = 'none');
document.addEventListener('keydown', e => { if (e.key === 'Escape') modalOverlay.style.display = 'none'; });
</script>
</body>
</html>
